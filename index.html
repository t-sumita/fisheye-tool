<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fisheye Tool</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #181818;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 60px;
    }

    /* ── Header ── */
    .site-header {
      width: 100%;
      max-width: 900px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 32px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.02em;
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .title-ver {
      font-size: 0.8rem;
      font-weight: 400;
      color: #555;
      letter-spacing: 0;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #666;
      margin-top: 4px;
    }

    .lang-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.9rem;
      padding-top: 2px;
    }

    .lang-btn {
      cursor: pointer;
      color: #555;
      font-weight: 600;
      transition: color 0.15s;
      user-select: none;
    }

    .lang-btn:hover { color: #aaa; }
    .lang-btn.active { color: #5b8fff; }
    .lang-sep { color: #444; }

    /* ── Main wrapper ── */
    .main-wrap {
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    /* ── Dual panel ── */
    .dual-panel {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      align-items: start;
    }

    /* ── Drop Zone ── */
    #dropZone {
      width: 100%;
      height: 340px;
      border: 2px dashed #3a3a3a;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      background: #202020;
      transition: border-color 0.2s, background 0.2s;
      user-select: none;
      padding: 20px;
    }

    #dropZone.dragover,
    #dropZone:hover {
      border-color: #5b8fff;
      background: #1c2235;
    }

    .dz-icon { font-size: 2.4rem; color: #555; }

    .dz-main {
      font-size: 0.92rem;
      color: #ccc;
      text-align: center;
    }

    .dz-main span { color: #5b8fff; font-weight: 600; }

    .dz-hint {
      font-size: 0.78rem;
      color: #555;
      text-align: center;
    }

    #fileInput { display: none; }

    /* ── Preview area (canvas + X/Y sliders) ── */
    .preview-area {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
    }

    .preview-and-y {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .canvas-wrap {
      position: relative;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      overflow: hidden;
      background:
        repeating-conic-gradient(#2c2c2c 0% 25%, #1a1a1a 0% 50%)
        0 0 / 20px 20px;
      box-shadow: 0 0 0 1px #333, 0 8px 40px rgba(0,0,0,0.6);
      flex-shrink: 0;
    }

    #outputCanvas {
      display: block;
      width: 300px;
      height: 300px;
    }

    .loading {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.65);
      border-radius: 50%;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-size: 0.88rem;
      color: #ccc;
    }

    .loading.visible { display: flex; }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #5b8fff;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Y slider (vertical, right of preview) */
    .y-slider-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 300px;
    }

    input.vert-slider {
      writing-mode: vertical-lr;
      height: 280px;
      width: 20px;
      -webkit-appearance: slider-vertical;
      appearance: slider-vertical;
      cursor: pointer;
      outline: none;
      background: #3a3a3a;
    }

    /* X slider (horizontal, below preview) */
    .x-slider-wrap {
      width: 300px;
    }

    .x-slider-wrap input[type="range"] {
      width: 100%;
    }

    /* ── Common slider styles ── */
    input[type="range"] {
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: #3a3a3a;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      background: #5b8fff;
      border-radius: 50%;
      cursor: pointer;
      transition: background 0.15s;
    }

    input[type="range"]::-webkit-slider-thumb:hover { background: #7aaaff; }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      background: #5b8fff;
      border: none;
      border-radius: 50%;
      cursor: pointer;
    }

    input.vert-slider::-webkit-slider-thumb {
      width: 16px;
      height: 16px;
    }

    /* ── Controls ── */
    .controls {
      background: #1e1e1e;
      border-radius: 12px;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .control-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .control-row > label:first-child {
      font-size: 0.85rem;
      color: #aaa;
      white-space: nowrap;
      min-width: 10em;
    }

    .control-row input[type="range"] { flex: 1; }

    .bg-opt { display: none; }
    .bg-opt.visible { display: flex; }

    .value-display {
      font-size: 0.85rem;
      color: #ccc;
      font-variant-numeric: tabular-nums;
      min-width: 4em;
      text-align: right;
    }

    /* Size hint */
    .size-hint {
      font-size: 0.75rem;
      color: #555;
      white-space: nowrap;
      min-width: 9em;
    }

    /* Undo button */
    .btn-undo {
      background: #252525;
      color: #777;
      border: 1px solid #353535;
      border-radius: 5px;
      padding: 3px 9px;
      font-size: 0.78rem;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }

    .btn-undo:not(:disabled):hover { color: #ccc; border-color: #555; }
    .btn-undo:disabled { opacity: 0.3; cursor: not-allowed; }

    /* Toggle switch */
    .toggle-wrap {
      position: relative;
      display: inline-flex;
      width: 44px;
      height: 24px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .toggle-wrap input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: #3a3a3a;
      border-radius: 12px;
      transition: background 0.2s;
    }

    .toggle-thumb {
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      top: 3px;
      background: #888;
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }

    .toggle-wrap input:checked ~ .toggle-track { background: #2a4a8a; }
    .toggle-wrap input:checked ~ .toggle-thumb {
      transform: translateX(20px);
      background: #5b8fff;
    }

    input[type="color"] {
      width: 36px;
      height: 28px;
      border: 1px solid #444;
      border-radius: 6px;
      background: none;
      cursor: pointer;
      padding: 2px;
    }

    /* ── Actions ── */
    .actions {
      display: flex;
      justify-content: center;
      gap: 12px;
    }

    .btn {
      padding: 10px 28px;
      border: none;
      border-radius: 8px;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      transition: filter 0.15s, transform 0.1s;
    }

    .btn:disabled { opacity: 0.3; cursor: not-allowed; filter: none !important; transform: none !important; }
    .btn:not(:disabled):hover { filter: brightness(1.15); }
    .btn:not(:disabled):active { transform: scale(0.96); }

    .btn-copy     { background: #2d2d2d; color: #ddd; }
    .btn-download { background: #5b8fff; color: #fff; }

    .copy-ok {
      text-align: center;
      font-size: 0.82rem;
      color: #6ee06e;
      min-height: 1.4em;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .copy-ok.visible { opacity: 1; }

    .reset-link {
      text-align: center;
      font-size: 0.82rem;
      color: #555;
      cursor: pointer;
      text-decoration: underline;
    }

    .reset-link:hover { color: #999; }
    .reset-link.hidden { display: none; }

    /* ── Tooltip ── */
    #tooltip {
      position: fixed;
      background: #252525;
      color: #ccc;
      font-size: 0.78rem;
      line-height: 1.5;
      padding: 7px 11px;
      border-radius: 6px;
      border: 1px solid #383838;
      pointer-events: none;
      z-index: 9999;
      max-width: 280px;
      opacity: 0;
      transition: opacity 0.15s;
    }

    #tooltip.visible { opacity: 1; }

    /* ── Responsive ── */
    @media (max-width: 680px) {
      .dual-panel { grid-template-columns: 1fr; }
      .canvas-wrap { width: 260px; height: 260px; }
      #outputCanvas { width: 260px; height: 260px; }
      .x-slider-wrap { width: 260px; }
      .y-slider-wrap { height: 260px; }
      input.vert-slider { height: 240px; }
      #dropZone { height: 200px; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <div>
    <h1><span id="titleEl"></span><span class="title-ver">v1.2.0</span></h1>
    <p class="subtitle" id="subtitleEl"></p>
  </div>
  <div class="lang-toggle">
    <span id="langJP" class="lang-btn">JP</span>
    <span class="lang-sep">/</span>
    <span id="langEN" class="lang-btn">EN</span>
  </div>
</header>

<main class="main-wrap">
  <!-- Dual panel: drop zone + preview with X/Y sliders -->
  <div class="dual-panel">
    <div id="dropZone" data-tooltip-key="tooltipDrop">
      <div class="dz-icon">&#128248;</div>
      <p class="dz-main" id="dzMain"></p>
      <p class="dz-hint" id="dzHint"></p>
      <input type="file" id="fileInput" accept=".jpg,.jpeg,.png">
    </div>

    <!-- Preview: canvas + Y slider (right) + X slider (below) -->
    <div class="preview-area">
      <div class="preview-and-y">
        <div class="canvas-wrap">
          <canvas id="outputCanvas" width="1000" height="1000"></canvas>
          <div class="loading" id="loading">
            <div class="spinner"></div>
            <span id="processingText"></span>
          </div>
        </div>
        <div class="y-slider-wrap" data-tooltip-key="tooltipOffset">
          <input type="range" id="ySlider" class="vert-slider"
                 min="-0.5" max="0.5" step="0.01" value="0">
        </div>
      </div>
      <div class="x-slider-wrap" data-tooltip-key="tooltipOffset">
        <input type="range" id="xSlider"
               min="-0.5" max="0.5" step="0.01" value="0">
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <!-- Curvature -->
    <div class="control-row" data-tooltip-key="tooltipCurvature">
      <label id="labelCurvature"></label>
      <input type="range" id="strengthSlider" min="0" max="2" step="0.01" value="1">
      <span class="value-display" id="strengthValue">1.00</span>
    </div>

    <!-- Zoom -->
    <div class="control-row" data-tooltip-key="tooltipZoom">
      <label id="labelZoom"></label>
      <input type="range" id="zoomSlider" min="0.5" max="3.0" step="0.01" value="1.0">
      <span class="value-display" id="zoomValue">1.00x</span>
    </div>

    <!-- Output size -->
    <div class="control-row" data-tooltip-key="tooltipSize">
      <label id="labelSize"></label>
      <input type="range" id="sizeSlider" min="0" max="5" step="1" value="5">
      <span class="value-display" id="sizeValue">1000 px</span>
      <span class="size-hint" id="sizeHint"></span>
      <button class="btn-undo" id="undoBtn" data-tooltip-key="tooltipUndo" disabled>↩ Undo</button>
    </div>

    <!-- Threshold (bg-opt) -->
    <div class="control-row bg-opt" id="thresholdRow" data-tooltip-key="tooltipThreshold">
      <label id="labelThreshold"></label>
      <input type="range" id="thresholdSlider" min="0" max="255" step="1" value="128">
      <span class="value-display" id="thresholdValue">128</span>
    </div>

    <!-- Color picker (bg-opt) -->
    <div class="control-row bg-opt" id="colorRow" data-tooltip-key="tooltipColor">
      <label id="labelLineColor"></label>
      <input type="color" id="colorPicker" value="#E67E22">
    </div>

    <!-- BG remove toggle -->
    <div class="control-row" data-tooltip-key="tooltipBgRemove">
      <label id="labelBgRemove"></label>
      <label class="toggle-wrap">
        <input type="checkbox" id="bgToggle">
        <span class="toggle-track"></span>
        <span class="toggle-thumb"></span>
      </label>
    </div>
  </div>

  <!-- Actions -->
  <div class="actions">
    <button class="btn btn-copy"     id="copyBtn" data-tooltip-key="tooltipCopy"     disabled></button>
    <button class="btn btn-download" id="dlBtn"   data-tooltip-key="tooltipDl"       disabled></button>
  </div>
  <div class="copy-ok" id="copyOk"></div>
  <div class="reset-link hidden" id="resetLink"></div>
</main>

<div id="tooltip"></div>

<script>
  // ── Presets ───────────────────────────────────────────────
  const PRESETS = [32, 64, 128, 256, 512, 1000];

  // ── i18n strings ──────────────────────────────────────────
  const S = {
    jp: {
      title:            'Fisheye Tool',
      subtitle:         '円周魚眼レンズ変換ツール',
      dropMain:         '<span>クリックして画像を選択</span>、またはここにドロップ',
      dropHint:         'JPG・PNG 対応 &nbsp;/&nbsp; Ctrl+V で貼り付けも可',
      processing:       '変換中…',
      curvature:        '湾曲率',
      zoom:             '拡大率',
      outputSize:       '出力サイズ',
      bgRemove:         '背景透明化',
      threshold:        'しきい値',
      lineColor:        '線の色',
      copy:             'コピー',
      download:         'ダウンロード',
      copied:           'クリップボードにコピーしました',
      reset:            '別の画像を使う',
      sizeHints:        ['ファビコン', '小アイコン', 'アプリアイコン', '中アイコン', 'SNSアイコン・サムネイル', 'フル解像度'],
      tooltipDrop:      '画像をドロップ、クリック、またはCtrl+Vで貼り付け',
      tooltipCurvature: '球面の膨らみ強度。大きいほど中央が拡大される',
      tooltipZoom:      '元画像の切り取り範囲を拡大・縮小する',
      tooltipSize:      '出力画像の解像度プリセットを選択する',
      tooltipUndo:      'ひとつ前のサイズに戻す',
      tooltipOffset:    'レンズの中心位置を調整する',
      tooltipBgRemove:  '白背景を透明にし、線の色を変換する',
      tooltipThreshold: '線と背景の判定境界。アンチエイリアス部分の調整に使用',
      tooltipColor:     '線の置換色を指定',
      tooltipCopy:      '変換結果をクリップボードにPNG形式でコピー',
      tooltipDl:        '変換結果をPNGファイルで保存',
    },
    en: {
      title:            'Fisheye Tool',
      subtitle:         'Circular Fisheye Lens Converter',
      dropMain:         '<span>Click to select an image</span>, or drop here',
      dropHint:         'JPG・PNG supported &nbsp;/&nbsp; Paste with Ctrl+V',
      processing:       'Processing…',
      curvature:        'Curvature',
      zoom:             'Zoom',
      outputSize:       'Output Size',
      bgRemove:         'Remove Background',
      threshold:        'Threshold',
      lineColor:        'Line Color',
      copy:             'Copy',
      download:         'Download',
      copied:           'Copied to clipboard',
      reset:            'Use another image',
      sizeHints:        ['Favicon', 'Small icon', 'App icon', 'Medium icon', 'SNS icon, Thumbnail', 'Full resolution'],
      tooltipDrop:      'Drop image here, click, or paste with Ctrl+V',
      tooltipCurvature: 'Sphere bulge intensity. Higher values expand the center more',
      tooltipZoom:      'Zoom in or out on the source image',
      tooltipSize:      'Select the output image resolution',
      tooltipUndo:      'Undo last size change',
      tooltipOffset:    'Adjust the center position of the lens',
      tooltipBgRemove:  'Make white background transparent and replace line colors',
      tooltipThreshold: 'Boundary between lines and background. Adjust for antialiased edges',
      tooltipColor:     'Specify the replacement color for lines',
      tooltipCopy:      'Copy the result to clipboard as PNG',
      tooltipDl:        'Save the result as a PNG file',
    }
  };

  // ── Language ──────────────────────────────────────────────
  let lang = navigator.language.startsWith('ja') ? 'jp' : 'en';

  function applyLang(l) {
    lang = l;
    const s = S[l];
    document.documentElement.lang = l === 'jp' ? 'ja' : 'en';
    document.title = s.title;

    document.getElementById('titleEl').textContent        = s.title;
    document.getElementById('subtitleEl').textContent     = s.subtitle;
    document.getElementById('dzMain').innerHTML           = s.dropMain;
    document.getElementById('dzHint').innerHTML           = s.dropHint;
    document.getElementById('processingText').textContent = s.processing;
    document.getElementById('labelCurvature').textContent = s.curvature;
    document.getElementById('labelZoom').textContent      = s.zoom;
    document.getElementById('labelSize').textContent      = s.outputSize;
    document.getElementById('labelBgRemove').textContent  = s.bgRemove;
    document.getElementById('labelThreshold').textContent = s.threshold;
    document.getElementById('labelLineColor').textContent = s.lineColor;
    document.getElementById('copyBtn').textContent        = s.copy;
    document.getElementById('dlBtn').textContent          = s.download;
    document.getElementById('copyOk').textContent         = s.copied;
    document.getElementById('resetLink').textContent      = s.reset;

    // Update size hint with new language
    document.getElementById('sizeHint').textContent = s.sizeHints[sizeIndex];

    document.getElementById('langJP').classList.toggle('active', l === 'jp');
    document.getElementById('langEN').classList.toggle('active', l === 'en');
  }

  document.getElementById('langJP').addEventListener('click', () => applyLang('jp'));
  document.getElementById('langEN').addEventListener('click', () => applyLang('en'));

  // ── Tooltip ───────────────────────────────────────────────
  const tooltipEl = document.getElementById('tooltip');

  function showTooltip(key, e) {
    const text = S[lang][key];
    if (!text) return;
    tooltipEl.textContent = text;
    moveTooltip(e);
    tooltipEl.classList.add('visible');
  }

  function moveTooltip(e) {
    const tw  = tooltipEl.offsetWidth || 200;
    const th  = tooltipEl.offsetHeight || 36;
    const pad = 12;
    let x = e.clientX + pad;
    let y = e.clientY - th - pad;
    if (x + tw > window.innerWidth - 8) x = e.clientX - tw - pad;
    if (y < 8) y = e.clientY + pad;
    tooltipEl.style.left = x + 'px';
    tooltipEl.style.top  = y + 'px';
  }

  document.querySelectorAll('[data-tooltip-key]').forEach(el => {
    const key = el.dataset.tooltipKey;
    el.addEventListener('mouseenter', e => showTooltip(key, e));
    el.addEventListener('mousemove',  e => moveTooltip(e));
    el.addEventListener('mouseleave', () => tooltipEl.classList.remove('visible'));
  });

  // ── Element refs ──────────────────────────────────────────
  const dropZone         = document.getElementById('dropZone');
  const fileInput        = document.getElementById('fileInput');
  const canvas           = document.getElementById('outputCanvas');
  const ctx              = canvas.getContext('2d');
  const loadingEl        = document.getElementById('loading');
  const copyBtn          = document.getElementById('copyBtn');
  const dlBtn            = document.getElementById('dlBtn');
  const copyOk           = document.getElementById('copyOk');
  const resetLink        = document.getElementById('resetLink');
  const strengthSlider   = document.getElementById('strengthSlider');
  const strengthValueEl  = document.getElementById('strengthValue');
  const zoomSlider       = document.getElementById('zoomSlider');
  const zoomValueEl      = document.getElementById('zoomValue');
  const sizeSlider       = document.getElementById('sizeSlider');
  const sizeValueEl      = document.getElementById('sizeValue');
  const sizeHintEl       = document.getElementById('sizeHint');
  const undoBtn          = document.getElementById('undoBtn');
  const xSlider          = document.getElementById('xSlider');
  const ySlider          = document.getElementById('ySlider');
  const bgToggle         = document.getElementById('bgToggle');
  const thresholdRow     = document.getElementById('thresholdRow');
  const colorRow         = document.getElementById('colorRow');
  const thresholdSlider  = document.getElementById('thresholdSlider');
  const thresholdValueEl = document.getElementById('thresholdValue');
  const colorPicker      = document.getElementById('colorPicker');

  // ── State ─────────────────────────────────────────────────
  let currentImg  = null;
  let currentName = 'image';
  let strength    = 1.0;
  let zoom        = 1.0;
  let offsetX     = 0.0;
  let offsetY     = 0.0;
  let bgRemove    = false;
  let threshold   = 128;
  let lineColor   = '#E67E22';
  let sizeIndex   = 5;          // index into PRESETS (default 1000px)
  let outputSize  = 1000;
  let sizeHistory = [];         // undo stack (up to 10)

  // ── Size display helpers ──────────────────────────────────
  function updateSizeDisplay() {
    sizeValueEl.textContent = outputSize + ' px';
    sizeHintEl.textContent  = S[lang].sizeHints[sizeIndex];
  }

  // ── Init lang (after sizeIndex is defined) ────────────────
  applyLang(lang);
  updateSizeDisplay();

  // ── Input handlers ────────────────────────────────────────
  dropZone.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', e => {
    if (e.target.files[0]) loadFile(e.target.files[0]);
  });

  dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('dragover');
  });

  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));

  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    const f = e.dataTransfer.files[0];
    if (f && /^image\/(jpeg|png)$/.test(f.type)) loadFile(f);
  });

  document.addEventListener('paste', e => {
    for (const item of e.clipboardData.items) {
      if (item.type.startsWith('image/')) { loadFile(item.getAsFile()); break; }
    }
  });

  resetLink.addEventListener('click', () => {
    currentImg = null;
    fileInput.value = '';
    canvas.width = canvas.height = outputSize;
    ctx.clearRect(0, 0, outputSize, outputSize);
    copyBtn.disabled = true;
    dlBtn.disabled   = true;
    resetLink.classList.add('hidden');
    copyOk.classList.remove('visible');
  });

  // ── Control handlers ──────────────────────────────────────
  strengthSlider.addEventListener('input', () => {
    strength = parseFloat(strengthSlider.value);
    strengthValueEl.textContent = strength.toFixed(2);
    if (currentImg) runFisheye(currentImg);
  });

  zoomSlider.addEventListener('input', () => {
    zoom = parseFloat(zoomSlider.value);
    zoomValueEl.textContent = zoom.toFixed(2) + 'x';
    if (currentImg) runFisheye(currentImg);
  });

  sizeSlider.addEventListener('input', () => {
    const newIndex = parseInt(sizeSlider.value);
    if (newIndex === sizeIndex) return;
    // Push to undo history (max 10)
    sizeHistory.push(sizeIndex);
    if (sizeHistory.length > 10) sizeHistory.shift();
    sizeIndex  = newIndex;
    outputSize = PRESETS[sizeIndex];
    updateSizeDisplay();
    undoBtn.disabled = false;
    if (currentImg) runFisheye(currentImg);
  });

  undoBtn.addEventListener('click', () => {
    if (sizeHistory.length === 0) return;
    sizeIndex  = sizeHistory.pop();
    outputSize = PRESETS[sizeIndex];
    sizeSlider.value = sizeIndex;
    updateSizeDisplay();
    undoBtn.disabled = sizeHistory.length === 0;
    if (currentImg) runFisheye(currentImg);
  });

  xSlider.addEventListener('input', () => {
    offsetX = parseFloat(xSlider.value);
    if (currentImg) runFisheye(currentImg);
  });

  ySlider.addEventListener('input', () => {
    offsetY = parseFloat(ySlider.value);
    if (currentImg) runFisheye(currentImg);
  });

  bgToggle.addEventListener('change', () => {
    bgRemove = bgToggle.checked;
    thresholdRow.classList.toggle('visible', bgRemove);
    colorRow.classList.toggle('visible', bgRemove);
    if (currentImg) runFisheye(currentImg);
  });

  thresholdSlider.addEventListener('input', () => {
    threshold = parseInt(thresholdSlider.value);
    thresholdValueEl.textContent = threshold;
    if (currentImg && bgRemove) runFisheye(currentImg);
  });

  colorPicker.addEventListener('input', () => {
    lineColor = colorPicker.value;
    if (currentImg && bgRemove) runFisheye(currentImg);
  });

  // ── File loading ──────────────────────────────────────────
  function loadFile(file) {
    currentName = file.name.replace(/\.[^.]+$/, '') || 'image';
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => { currentImg = img; runFisheye(img); };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  // ── Helpers ───────────────────────────────────────────────
  function hexToRgb(hex) {
    return [
      parseInt(hex.slice(1, 3), 16),
      parseInt(hex.slice(3, 5), 16),
      parseInt(hex.slice(5, 7), 16),
    ];
  }

  // ── Fisheye + zoom + offset + bg removal + output size ────
  function runFisheye(img) {
    loadingEl.classList.add('visible');

    requestAnimationFrame(() => setTimeout(() => {
      const OUT = outputSize;

      // Resize canvas to output size
      canvas.width = canvas.height = OUT;

      // Centre-crop source to square
      const sq = Math.min(img.width, img.height);
      const ox = (img.width  - sq) / 2;
      const oy = (img.height - sq) / 2;

      const tmp = document.createElement('canvas');
      tmp.width = tmp.height = sq;
      tmp.getContext('2d').drawImage(img, ox, oy, sq, sq, 0, 0, sq, sq);
      const sd = tmp.getContext('2d').getImageData(0, 0, sq, sq).data;

      const out = ctx.createImageData(OUT, OUT);
      const od  = out.data;
      const [lr, lg, lb] = hexToRgb(lineColor);

      const outM1 = OUT - 1;
      for (let py = 0; py < OUT; py++) {
        const ny = (py / outM1) * 2 - 1;
        for (let px = 0; px < OUT; px++) {
          const nx = (px / outM1) * 2 - 1;
          const r  = Math.sqrt(nx * nx + ny * ny);
          const oi = (py * OUT + px) * 4;

          if (r > 1) { od[oi] = od[oi+1] = od[oi+2] = od[oi+3] = 0; continue; }

          // Spherical projection with strength
          const r_sphere = Math.asin(r) / (Math.PI / 2);
          const r_src    = r + strength * (r_sphere - r);

          // Zoom + offset → source sampling coordinate
          let sx, sy;
          if (r < 1e-9) {
            sx = 0.5 + offsetX;
            sy = 0.5 + offsetY;
          } else {
            sx = (nx / r * r_src / zoom + 1) / 2 + offsetX;
            sy = (ny / r * r_src / zoom + 1) / 2 + offsetY;
          }

          // Bilinear interpolation
          const fx  = sx * sq, fy  = sy * sq;
          const x0  = Math.floor(fx), y0  = Math.floor(fy);
          const tx  = fx - x0,        ty  = fy - y0;
          const cx0 = Math.max(0, Math.min(sq-1, x0));
          const cy0 = Math.max(0, Math.min(sq-1, y0));
          const cx1 = Math.max(0, Math.min(sq-1, x0+1));
          const cy1 = Math.max(0, Math.min(sq-1, y0+1));

          const i00 = (cy0*sq + cx0)*4, i10 = (cy0*sq + cx1)*4;
          const i01 = (cy1*sq + cx0)*4, i11 = (cy1*sq + cx1)*4;
          const w00 = (1-tx)*(1-ty), w10 = tx*(1-ty);
          const w01 = (1-tx)*ty,     w11 = tx*ty;

          const pr = sd[i00]*w00 + sd[i10]*w10 + sd[i01]*w01 + sd[i11]*w11;
          const pg = sd[i00+1]*w00 + sd[i10+1]*w10 + sd[i01+1]*w01 + sd[i11+1]*w11;
          const pb = sd[i00+2]*w00 + sd[i10+2]*w10 + sd[i01+2]*w01 + sd[i11+2]*w11;
          const pa = sd[i00+3]*w00 + sd[i10+3]*w10 + sd[i01+3]*w01 + sd[i11+3]*w11;

          if (bgRemove) {
            const luma = (pr + pg + pb) / 3;
            if (luma < threshold) {
              od[oi] = lr; od[oi+1] = lg; od[oi+2] = lb; od[oi+3] = 255;
            } else {
              od[oi] = od[oi+1] = od[oi+2] = od[oi+3] = 0;
            }
          } else {
            od[oi] = pr; od[oi+1] = pg; od[oi+2] = pb; od[oi+3] = pa;
          }
        }
      }

      ctx.putImageData(out, 0, 0);
      loadingEl.classList.remove('visible');
      copyBtn.disabled = false;
      dlBtn.disabled   = false;
      resetLink.classList.remove('hidden');
    }, 20));
  }

  // ── Copy to clipboard ─────────────────────────────────────
  copyBtn.addEventListener('click', () => {
    canvas.toBlob(async blob => {
      try {
        await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
        copyOk.classList.add('visible');
        setTimeout(() => copyOk.classList.remove('visible'), 2200);
      } catch (err) {
        alert((lang === 'jp' ? 'コピー失敗: ' : 'Copy failed: ') + err.message);
      }
    }, 'image/png');
  });

  // ── Download ──────────────────────────────────────────────
  dlBtn.addEventListener('click', () => {
    const a = document.createElement('a');
    a.download = `fisheye_${currentName}_${outputSize}px.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();
  });
</script>
</body>
</html>
